name: Build & Deploy Flappy

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set Emscripten cache path
        run: |
          echo "EM_CACHE=/home/runner/.emscripten_cache" >> $GITHUB_ENV

      - name: Cache Emscripten ports
        uses: actions/cache@v4
        with:
          path: /home/runner/.emscripten_cache
          key: emscripten-ports-${{ runner.os }}

      - name: Setup Emscripten
        run: |
          git clone https://github.com/emscripten-core/emsdk.git
          cd emsdk
          ./emsdk install latest
          ./emsdk activate latest
          source ./emsdk_env.sh
          cd ..

      - name: Build with Emscripten
        run: |
          source emsdk/emsdk_env.sh
          emcc main.c \
          -o index.html \
          -s USE_SDL=2 \
          -s USE_SDL_IMAGE=2 \
          -s USE_SDL_TTF=2 \
          -s USE_SDL_MIXER=2 \
          -s EXPORTED_FUNCTIONS='["_main","_Load","_Save"]' \
          -lidbfs.js \
          -s SDL2_IMAGE_FORMATS='["png","jpg","jpeg","bmp"]' \
          -s SDL2_MIXER_FORMATS='["wav","ogg","mp3"]' \
          -s ALLOW_MEMORY_GROWTH=1 \
          -s ASSERTIONS=1 \
          -s EMULATE_FUNCTION_POINTER_CASTS=1 \
          -g -fsanitize=address \
          --preload-file assets@assets \
          --use-preload-cache \
          -O2

      - name: Show files
        run: ls -R

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
          force_orphan: true
          keep_files: false